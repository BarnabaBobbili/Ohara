<!DOCTYPE html>
<html>
<head>
    <title>Test Activity Logs API</title>
</head>
<body>
    <h1>Activity Logs API Test</h1>
    <button onclick="testAPI()">Fetch Activity Logs</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('http://localhost:8000/api/reports/activity-logs?limit=10');
                const data = await response.json();
                
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('API Response:', data);
                console.log('Logs count:', data.logs?.length);
                console.log('First log:', data.logs?.[0]);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }
        
        // Auto-run on load
        window.onload = testAPI;
    </script>
</body>
</html>
